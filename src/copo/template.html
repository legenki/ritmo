<div class="app-container">
  <!-- Sidebar Control Panel -->
  <aside class="sidebar secuencia-panel right-sidebar">
    <!-- Controls injected here by buildUI() -->
    <div class="sidebar-content" id="co-controls"></div>

    <footer class="sidebar-footer">
      <button id="co-btn-save-png" class="btn btn-accent">Export as PNG</button>
      <button id="co-btn-save-svg" class="btn btn-secondary">Export as SVG</button>
      <div class="btn-group">
        <button id="co-btn-save-mp4" class="btn btn-secondary">Export as MP4</button>
        <select
          id="co-mp4-length"
          class="grafema-select"
          style="width: auto; min-width: 64px"
          title="Video length"
        >
          <option value="2">2s</option>
          <option value="4" selected>4s</option>
          <option value="6">6s</option>
          <option value="8">8s</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
        </select>
      </div>
      <div id="co-export-status" class="export-status"></div>
    </footer>
  </aside>

  <!-- Canvas Viewport -->
  <main class="canvas-viewport" id="copo-canvas">
    <!-- p5.js canvas injected here -->
  </main>
</div>
