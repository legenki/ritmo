<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritmo</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="src/css/style.css">

  <!-- LIBRARIES -->
  <script src="/lib/p5.min.js"></script>

  <!-- Small helpers shared by the workspaces (seeded noise + HSLuv, ~20 KB) -->
  <script src="/lib/vendor/alea.js"></script>
  <script src="/lib/vendor/simplex-noise.min.js"></script>
  <script src="/lib/vendor/hsluv.min.js"></script>
  <!-- Heavy vendor libs (paper, colorjs, h264 encoder) load on demand per
       workspace — see shared/utils/lazyLibs.js -->

</head>
<body class="theme-light">

  <!-- Top-Center Tab Switcher Capsule -->
  <div style="position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:1000; display:flex; gap:8px;">
    <div class="app-switcher" role="tablist">
      <button id="tab-ritmo" class="switcher-tab active" data-target="ritmo" role="tab" aria-selected="true" aria-controls="app-ritmo">RITMO</button>
      <button id="tab-borro" class="switcher-tab" data-target="borro" role="tab" aria-selected="false" aria-controls="app-borro">BORRO</button>
      <button id="tab-copo" class="switcher-tab" data-target="copo" role="tab" aria-selected="false" aria-controls="app-copo">COPO</button>
      <button id="tab-refrac" class="switcher-tab" data-target="refrac" role="tab" aria-selected="false" aria-controls="app-refrac">REFRAC</button>
    </div>
    <div class="app-switcher" style="padding: 3px;">
      <button id="btn-global-theme" class="switcher-tab" style="padding: 8px; display: flex; align-items: center; justify-content: center;" title="Toggle Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="apps-container" style="width:100vw; height:100vh; position:absolute; top:0; left:0; z-index:0; overflow:hidden;">

    <!-- Ritmo -->
    <div id="app-ritmo" class="app-view active" role="tabpanel" aria-labelledby="tab-ritmo" style="width:100%; height:100%;">
      <!--#include file="src/ritmo/template.html"-->
    </div>

    <!-- Borro -->
    <div id="app-borro" class="app-view" role="tabpanel" aria-labelledby="tab-borro" style="width:100%; height:100%; display:none;">
      <!--#include file="src/borro/template.html"-->
    </div>

    <!-- Copo -->
    <div id="app-copo" class="app-view" role="tabpanel" aria-labelledby="tab-copo" style="width:100%; height:100%; display:none;">
      <!--#include file="src/copo/template.html"-->
    </div>

    <!-- Refrac -->
    <div id="app-refrac" class="app-view" role="tabpanel" aria-labelledby="tab-refrac" style="width:100%; height:100%; display:none;">
      <!--#include file="src/refrac/template.html"-->
    </div>
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
